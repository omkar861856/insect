    <script type="text/javascript">
      keyboardeventKeyPolyfill.polyfill();

      var calculatorEnv = Calculator.initialEnvironment;
      var clearCommands = ["clear", "cls", "quit", "exit"];

      function updateUrlQuery(query) {
        var url = new URL(window.location);
        if (query == null) {
          url.searchParams.delete('q');
        } else {
          url.searchParams.set('q', query);
        }
        history.replaceState(null, null, url);
      }

      function interpret(line) {
        var lineTrimmed = line.trim();
        if (lineTrimmed === "" || lineTrimmed[0] === "#") {
          return;
        }

        var res = Calculator.repl(Calculator.fmtJqueryTerminal)(calculatorEnv)(line);
        calculatorEnv = res.newEnv;

        if (clearCommands.indexOf(res.msgType) >= 0) {
          this.clear();
          return;
        } else if (res.msgType === "quit") {
          this.clear();
          calculatorEnv = Calculator.initialEnvironment;
          return;
        } else if (res.msgType === "copy") {
          if (res.msg === "") {
            res.msg = "\nNo result to copy.\n";
          } else {
            navigator.clipboard.writeText(res.msg);
            res.msg = "\nCopied result '" + res.msg + "' to clipboard.\n";
          }
        }

        updateUrlQuery(line);
        return res.msg;
      }

      function colored(col, str) {
        return "[[;#" + col + ";]" + str + "]";
      }

      $(document).ready(function() {
        var visitedBefore = localStorage.getItem("visitedBefore") === "yes";
        var greeting = colored("94a3b8", "Welcome to Calculator. Enter '?' for help.");
        
        var term = $('#terminal').terminal(interpret, {
          greetings: greeting,
          name: "terminal",
          height: '100%',
          prompt: "[[;;;prompt]➜ ]",
          checkArity: false,
          historySize: 200,
          historyFilter(line) {
            return line.trim() !== "";
          },
          completion(inp, cb) {
            var identifiers = Calculator.identifiers(calculatorEnv);
            var keywords = identifiers.concat(Calculator.functions(calculatorEnv), Calculator.supportedUnits, Calculator.commands);
            cb(keywords.sort());
          },
          onClear() {
            updateUrlQuery(null);
          }
        });

        if (location.search) {
          var queryParams = new URLSearchParams(location.search);
          if (queryParams.has("q")) {
            term.exec(queryParams.get("q"));
          }
        }
      });
    </script>
