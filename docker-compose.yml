services:
  insect:
    build: .
    container_name: insect
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.insect.rule=Host(`insect.ecotron.co.in`)"
      - "traefik.http.routers.insect.entrypoints=websecure"
      - "traefik.http.routers.insect.tls.certresolver=myresolver"
      - "traefik.http.services.insect.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
